name: CI

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --all --all-features

      - name: Test
        run: cargo test --all --all-features -- --nocapture

      - name: Clippy
        run: cargo clippy --all --all-features -- -D warnings

      - name: Format check
        run: cargo fmt --all -- --check

  pybos:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install maturin
        run: pip install maturin

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Clean workspace
        run: rm -rf target/

      - name: Build pybos
        run: |
          maturin build -m crates/pybos/Cargo.toml --release -o dist
          WHEEL_PATH=$(ls dist/pybos-*.whl)
          pip install "$WHEEL_PATH" --force-reinstall --no-deps

  jsbos:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        node-version: ['20']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: crates/jsbos/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install npm deps
        run: cd crates/jsbos && npm install

      - name: Build jsbos
        run: cd crates/jsbos && npm run build
