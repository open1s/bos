name: CI

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --all --all-features

      - name: Test
        run: cargo test --all --all-features -- --nocapture

      - name: Clippy
        run: cargo clippy --all --all-features -- -D warnings

      - name: Format check
        run: cargo fmt --all -- --check

  pybos:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: crates/pybos/pyproject.toml

      - name: Install maturin
        run: pip install maturin

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          cache-targets: false

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "pybos-ubuntu-3.11"

      - name: Clean pyo3 cache
        run: rm -rf target/debug/.fingerprint/pyo3-build-config* target/release/.fingerprint/pyo3-build-config*

      - name: Build pybos
        run: |
          cd crates/pybos
          maturin build --release
          pip install --force-reinstall target/wheels/*.whl

  jsbos:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        node-version: ['20']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: crates/jsbos/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install npm deps
        run: cd crates/jsbos && npm install

      - name: Build jsbos
        run: cd crates/jsbos && npm run build