name: jsbos pipeline
env:
  DEBUG: napi:*
  APP_NAME: brainos
  MACOSX_DEPLOYMENT_TARGET: '10.13'
  CARGO_INCREMENTAL: '1'

on:
  push:
    branches:
      - main
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build bindings for ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            build: yarn build
          - target: aarch64-pc-windows-msvc
            runner: windows-11-arm
            build: yarn build
          - target: aarch64-apple-darwin
            runner: macos-latest
            build: yarn build --target aarch64-apple-darwin
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            build: yarn build --target x86_64-unknown-linux-gnu
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            build: yarn build --target aarch64-unknown-linux-gnu
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        working-directory: ./crates/jsbos
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Setup yarn
        run: corepack enable && corepack prepare yarn@4.13.0 --activate

      - name: Install dependencies
        run: yarn install --no-immutable

      - name: Build
        run: ${{ matrix.build }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: bindings-${{ matrix.target }}
          path: crates/jsbos/*.node
          retention-days: 7

  test-macos-windows:
    name: Test bindings on ${{ matrix.target }} - node@${{ matrix.node }}
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            host: windows-latest
            architecture: x64
            node: '20'
          - target: aarch64-pc-windows-msvc
            host: windows-11-arm
            architecture: arm64
            node: '20'
          - target: aarch64-apple-darwin
            host: macos-latest
            architecture: arm64
            node: '20'
    runs-on: ${{ matrix.host }}
    defaults:
      run:
        working-directory: ./crates/jsbos
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          architecture: ${{ matrix.architecture }}

      - name: Setup yarn
        run: corepack enable && corepack prepare yarn@4.13.0 --activate

      - name: Install dependencies
        run: yarn install --no-immutable

      - name: Download artifacts
        uses: actions/download-artifact@v6
        with:
          name: bindings-${{ matrix.target }}
          path: crates/jsbos

      - name: List artifacts
        run: ls -la *.node
        shell: bash

      - name: Run smoke test
        run: yarn test
        env:
          OPENAI_API_KEY: test-key
          LLM_MODEL: test-model

  test-linux:
    name: Test ${{ matrix.target }} - node@${{ matrix.node }}
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            node: '20'
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            node: '20'
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        working-directory: ./crates/jsbos
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}

      - name: Setup yarn
        run: corepack enable && corepack prepare yarn@4.13.0 --activate

      - name: Install dependencies
        run: yarn install --no-immutable

      - name: Download artifacts
        uses: actions/download-artifact@v6
        with:
          name: bindings-${{ matrix.target }}
          path: crates/jsbos

      - name: List artifacts
        run: ls -la *.node
        shell: bash

      - name: Run smoke test
        run: yarn test
        env:
          OPENAI_API_KEY: test-key
          LLM_MODEL: test-model

  publish:
    name: Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    needs:
      - build
      - test-macos-windows
      - test-linux
    defaults:
      run:
        working-directory: ./crates/jsbos
    steps:
      - uses: actions/checkout@v6

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Setup yarn
        run: corepack enable && corepack prepare yarn@4.13.0 --activate

      - name: Install dependencies
        run: yarn install --no-immutable

      - name: create npm dirs
        run: yarn napi create-npm-dirs

      - name: Download all artifacts
        uses: actions/download-artifact@v6
        with:
          path: crates/jsbos/artifacts

      - name: Create npm artifacts
        run: yarn artifacts

      - name: List packages
        run: ls -R ./npm
        shell: bash

      - name: Publish
        run: |
          npm config set provenance true
          if git log -1 --pretty=%B | grep "^[0-9]\+\.[0-9]\+\.[0-9]\+$"; then
            echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" >> ~/.npmrc
            npm publish --access public
          elif git log -1 --pretty=%B | grep "^[0-9]\+\.[0-9]\+"; then
            echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" >> ~/.npmrc
            npm publish --tag next --access public
          else
            echo "Not a release, skipping publish"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}