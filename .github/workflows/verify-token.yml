name: Verify NPM Token
on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check NPM_TOKEN
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "NPM_TOKEN is EMPTY or not set"
            exit 1
          else
            echo "NPM_TOKEN is set: ${NPM_TOKEN:0:4}..."
          fi
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}